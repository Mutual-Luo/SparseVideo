# Editable defaults for Sparse-VideoGen SVG2 / SAP.
# Each public backbone has an explicit config block under model_defaults.
defaults:
  dense_warmup_step_ratio: 0.1 # Fraction of denoising steps that run dense before sparse attention starts.
  dense_warmup_layer_ratio: 0.03 # Fraction of earliest transformer layers that always run dense.
  num_q_centroids: 50 # Number of query centroids for online k-means clustering.
  num_k_centroids: 200 # Number of key centroids for online k-means clustering.
  top_p_kmeans: 0.9 # Cumulative attention mass kept when selecting sparse cluster pairs.
  min_kc_ratio: 0.0 # Minimum kept key-centroid ratio after top-p filtering.
  kmeans_iter_init: 0 # K-means iterations used when initializing centroids.
  kmeans_iter_step: 0 # K-means update iterations used on later sparse steps.
  zero_step_kmeans_init: false # If true, initialize k-means state during dense warmup step 0.
  context_length: null # Optional Hunyuan/text-tail context token length override.
  prompt_length: null # Optional prompt token length override for text/video split handling.

