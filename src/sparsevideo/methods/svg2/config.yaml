    num_q_centroids: 300
    num_k_centroids: 1000
    top_p_kmeans: 0.9
    min_kc_ratio: 0.1
    kmeans_iter_init: 50
    kmeans_iter_step: 2
    zero_step_kmeans_init: false
    context_length: null
