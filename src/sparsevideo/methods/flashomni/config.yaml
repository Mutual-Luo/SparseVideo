# Editable defaults for FlashOmni.
# FlashOmni has both upstream native-kernel settings and paper/MM-DiT policy
# settings. Dense warmup uses the same names and values for every backbone.
defaults:
  implementation: upstream # Runtime implementation: upstream uses the owned FlashOmni CUDA/C++ wrapper.
  backend: auto # Backend selector passed to the FlashOmni adapter.
  workspace_bytes: 268435456 # Workspace allocation size in bytes for the native wrapper.
  sparse_block_size_for_q: 128 # Query block size used by sparse FlashOmni planning.
  sparse_block_size_for_kv: 128 # Key/value block size used by sparse FlashOmni planning.
  causal: false # Whether the FlashOmni attention plan is causal.
  pos_encoding_mode: NONE # Positional encoding mode forwarded to the FlashOmni plan.
  use_fp16_qk_reduction: false # Use fp16 QK reduction in the FlashOmni native kernel.
  logits_soft_cap: 0.0 # Optional logits soft cap; 0 disables capping.
  sm_scale: null # Optional explicit softmax scale.
  rope_scale: null # Optional RoPE scale forwarded to the native wrapper.
  rope_theta: null # Optional RoPE theta forwarded to the native wrapper.
  sparse_pattern: paper_mmdit # Sparse pattern policy: explicit, global_random, paper_mmdit, or local_qk_topk.
  sparse_size: 128 # Sparse block size used by global_random and related benchmark policies.
  spq_Q: 0.0 # Query sparsity probability used by the upstream global_random benchmark.
  spq_KV: 0.8 # Key/value sparsity probability used by the upstream global_random benchmark.
  text_token: 512 # Number of text tokens protected by FlashOmni sparse policies.
  threshold_q: 0.50 # Query score threshold for the paper/MM-DiT sparse-symbol policy.
  threshold_kv: 0.05 # Key/value score threshold for the paper/MM-DiT sparse-symbol policy.
  fresh_threshold: 6 # Number of fresh steps before cache reuse in paper/MM-DiT mode.
  max_order: 1 # Taylor/cache order used by the paper/MM-DiT policy.
  first_enhance: 8 # Number of early steps using enhanced sparse-symbol refresh.
  saving_threshold_q_for_taylor: 0.3 # Threshold for saving Taylor-cache query information.
  max_sequence_length: -1 # Optional maximum sequence length; -1 means infer from runtime tensors.
  num_inference_steps: 50 # Total denoising steps used to turn dense_warmup_step_ratio into a count.
  dense_warmup_step_ratio: 0.1 # Fraction of denoising steps that run dense before sparse attention starts.
  dense_warmup_layer_ratio: 0.03 # Fraction of earliest transformer layers that always run dense.
  simthreshd1: 0.1 # Legacy similarity threshold used by diagnostic sparse policies.
  tau_q: 0.50 # Query threshold alias used by FlashOmni paper notation.
  tau_kv: 0.05 # Key/value threshold alias used by FlashOmni paper notation.
  N: 6 # Cache refresh interval alias used by FlashOmni paper notation.
  D: 1 # Cache order alias used by FlashOmni paper notation.
  S_q: 0.3 # Cache threshold alias used by FlashOmni paper notation.
  use_sparse_gemm: false # Enable owned sparse GEMM Q/O projection hooks where supported.
  taylor_cache_device: cpu # Device used to store Taylor-cache tensors.
  debug_memory: false # Enable detailed FlashOmni memory debugging.
  debug_memory_max_events: 4000 # Maximum memory-debug events kept in the runtime log.
  sparse_info: null # Explicit query sparse-info tensor or path.
  sparse_kv_info: null # Explicit key/value sparse-info tensor or path.
  sparse_info_indptr: null # Indptr tensor or path for query sparse-info.
  sparse_kv_info_indptr: null # Indptr tensor or path for key/value sparse-info.
  sparse_kv_budget: 0.5 # Budget used by the local diagnostic top-k sparse policy.

