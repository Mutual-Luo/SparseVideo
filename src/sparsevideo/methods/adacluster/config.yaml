# Editable defaults for AdaCluster.
# Model-specific blocks override only the listed keys; unspecified keys inherit
# from defaults. Dense warmup uses the same names and values for every backbone.
defaults:
  dense_warmup_step_ratio: 0.1 # Fraction of denoising steps that run dense before sparse attention starts.
  dense_warmup_layer_ratio: 0.03 # Fraction of earliest transformer layers that always run dense.
  topk_num: 128 # Number of key/value tokens kept per query block after clustering.
  q_kernel_num: 100 # Number of query clusters for the fixed cluster-count path.
  kv_kernel_num: 500 # Number of key/value clusters for the fixed cluster-count path.
  kmeans_iter_init: 3 # K-means iterations used when initializing centroids.
  kmeans_iter_step: 1 # K-means update iterations used on later sparse steps.
  use_thresholded_kmeans_loop: false # Enable the alternate thresholded upstream k-means loop.
  initial_q_kernel_num: 50 # Initial query cluster count for the thresholded loop.
  initial_kv_kernel_num: 200 # Initial key/value cluster count for the thresholded loop.
  q_distance_threshold: 9.0 # Query centroid distance threshold for adding thresholded-loop clusters.
  kv_distance_threshold: 5.5 # Key/value centroid distance threshold for adding thresholded-loop clusters.
  thresholded_kmeans_iter_time: 3 # Number of thresholded k-means refinement iterations.
  thresholded_kmeans_max_iterations: 10 # Maximum thresholded-loop iterations before giving up.

