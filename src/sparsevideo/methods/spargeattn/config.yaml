# Editable defaults for SpargeAttn.
# Model-specific blocks override only the listed keys; unspecified keys inherit
# from defaults. Dense warmup stays shared across backbones.
defaults:
  dense_warmup_step_ratio: 0.1 # Fraction of denoising steps that run dense before sparse attention starts.
  dense_warmup_layer_ratio: 0.03 # Fraction of earliest transformer layers that always run dense.
  mode: topk # SpargeAttn dispatch mode: cdfthreshd, topk, or block_sparse.
  value: null # Upstream example-script value field used by mode-specific paths.
  topk: 0.5 # Top-k sparse attention budget for the plug-and-play topk mode.
  cdfthreshd: 0.98 # CDF threshold used by cdfthreshd mode.
  simthreshd1: null # First similarity threshold passed to sparse kernels when enabled.
  pvthreshd: 50 # PV threshold passed to sparse kernels.
  attention_sink: false # Keep sink tokens dense in compatible sparse kernels.
  smooth_k: true # Smooth keys before similarity estimation.
  dropout_p: 0.0 # Attention dropout; inference should normally keep this at 0.
  scale: null # Optional explicit attention scale.
  tensor_layout: HND # Tensor layout expected by the native SpargeAttn kernels.
  output_dtype: float16 # Output dtype requested from the SpargeAttn kernel wrapper.
  return_sparsity: false # Return sparsity diagnostics from supported kernels.
  mask_id: null # Torch tensor path for block_sparse mode masks.
  tune: false # Run SparseAttentionMeansim tuning and save the tuned state.
  parallel_tune: false # Run tuning in parallel where the owned runtime supports it.
  sim_rule: l1 # Similarity metric used by tuning.
  l1: 0.07 # L1 threshold used by tuning.
  pv_l1: 0.08 # PV L1 threshold used by tuning.
  cos_sim: 0.98 # Cosine-similarity threshold used by tuning.
  rmse: 0.07 # RMSE threshold used by tuning.
  rearrange_kwargs: {} # Extra rearrange arguments forwarded to the tuning/runtime wrapper.
  tune_pv: true # Tune PV threshold together with QK similarity thresholds.
  verbose: false # Print SpargeAttn tuning/runtime debug logs.
  model_out_path: null # Path used to load or save tuned SpargeAttn state.
  use_fused_qk_norm_rope: true # Keep fused QK-norm/RoPE helpers enabled for compatible video processors.

