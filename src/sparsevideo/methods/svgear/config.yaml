# Editable defaults for Sparse-VideoGen Error-Aware Reduction (SVG-EAR / EAR).
# EAR reuses the SVG2/SAP k-means clustering and permutation, but selects blocks
# by estimated output error (gamma trades block area against error) and recovers
# pruned blocks via centroid attention. Each public backbone has an explicit block.
defaults:
  dense_warmup_step_ratio: 0.1
  dense_warmup_layer_ratio: 0.03
  num_q_centroids: 50
  num_k_centroids: 200
  top_p_kmeans: 0.9
  min_kc_ratio: 0.05
  gamma: 1.0
  kmeans_iter_init: 0
  kmeans_iter_step: 0
  zero_step_kmeans_init: false
  context_length: null
  prompt_length: null
