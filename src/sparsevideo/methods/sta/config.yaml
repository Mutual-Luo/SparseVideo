# Editable defaults for FastVideo Sliding Tile Attention.
# Model-specific blocks override only the listed keys; unspecified keys inherit
# from defaults. Dense warmup uses the same names and values for every backbone.
defaults:
  dense_warmup_step_ratio: 0.1 # Fraction of denoising steps that run dense before sparse attention starts.
  dense_warmup_layer_ratio: 0.03 # Fraction of earliest transformer layers that always run dense.
  tile_size: # STA tile size in temporal, height, and width token units.
    - 6
    - 8
    - 8
  window_size: # STA sliding window size in temporal, height, and width tile units.
    - 3
    - 6
    - 10
  seq_shape: null # Optional sequence shape string such as 18x48x80 for strict parity layouts.
  has_text: true # Whether the attention sequence includes text tokens.
  STA_mode: STA_inference # FastVideo mode name; only STA_inference is the parity path.
  mask_strategy_file_path: null # Optional mask strategy JSON path; config.py fills owned per-model asset paths.
  mask_candidates: # STA_searching records per-step/layer/head losses for these candidate windows.
    - [3, 1, 10]
    - [1, 5, 7]
    - [3, 3, 3]
    - [1, 6, 5]
    - [1, 3, 10]
    - [3, 6, 1]
  mask_search_output_dir: result/sta_mask_search
  mask_search_prompt_id: null

model_defaults:
