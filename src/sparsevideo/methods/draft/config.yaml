# Editable defaults for draft-attention.
# Model-specific blocks override only the listed keys; unspecified keys inherit
# from defaults. Dense warmup uses the same names and values for every backbone.
defaults:
  dense_warmup_step_ratio: 0.1 # Fraction of denoising steps that run dense before sparse attention starts.
  dense_warmup_layer_ratio: 0.03 # Fraction of earliest transformer layers that always run dense.
  pool_h: 8 # Height pooling factor used by Draft's token reduction stage.
  pool_w: 16 # Width pooling factor used by Draft's token reduction stage.
  latent_h: null # Latent height override for model/layout validation.
  latent_w: null # Latent width override for model/layout validation.
  visual_len: null # Number of video tokens in the attention sequence.
  text_len: null # Number of text tokens in the attention sequence.
  sparsity_ratio: 0.9 # Fraction of attention kept by Draft's sparse mask policy.
  batch_size: null # Batch size hint used by layout validation.
  block_sparse_attention: true # Must stay true for sparse Draft; false is the dense baseline.

