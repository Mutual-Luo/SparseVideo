  longcat-video:
    # LongCat is a condition-prefix continuation model (KV > Q); the generic Wan
    # defaults under-attend the later generation frames, leaving a vertical seam
    # and quality collapse past ~2.5s. sparsity=0.7 (chosen from a 0.3/0.5/0.7/0.9
    # sweep) keeps enough attention to anchor the tail frames; a longer dense
    # warmup further stabilizes them.
    dense_warmup_step_ratio: 0.15
    dense_warmup_layer_ratio: 0.05
    num_sampled_rows: 64
    sample_mse_max_row: 10000
    sparsity: 0.7
    context_length: null
