# Editable defaults for radial-attention.
# Model-specific blocks override only the listed keys; unspecified keys inherit
# from defaults. Dense warmup uses the same names and values for every backbone.
defaults:
  dense_warmup_step_ratio: 0.1 # Fraction of denoising steps that run dense before sparse attention starts.
  dense_warmup_layer_ratio: 0.03 # Fraction of earliest transformer layers that always run dense.
  decay_factor: 1 # Radial mask decay factor controlling sparsity by distance.
  block_size: 128 # Block size used by FlashInfer/Sage sparse mask construction.
  use_sage_attention: false # Route sparse attention through owned SageAttention instead of FlashInfer.
  allow_flex_fallback: false # Allow local FlexAttention debug fallback when strict kernels are disabled.

