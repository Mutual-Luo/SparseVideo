# Editable defaults for SVOO.
# Each public backbone has an explicit config block under model_defaults.
defaults:
  dense_warmup_step_ratio: 0.1
  dense_warmup_layer_ratio: 0.03
  num_q_centroids: 50
  num_k_centroids: 200
  top_p_kmeans: 0.9
  min_kc_ratio: 0.0
  kmeans_iter_init: 0
  kmeans_iter_step: 0
  zero_step_kmeans_init: false
  enable_mem_save: true
  reuse_interval: 20
  use_dynamic_min_kc_ratio: false
  sparsity_csv_path: sparsity_profiles/sparsity_results.csv
  dynamic_min_kc_ratio_min: null
  dynamic_min_kc_ratio_max: null
  measure_attention_sparsity: false
  sparsity_output_file: attention_sparsity.txt
  sparsity_batch_size: 0
  sparsity_query_samples: 0
  sparsity_threshold: 0.95
  sparsity_start_step: 1
