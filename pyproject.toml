[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sparsevideo"
version = "0.1.0"
description = "Plug-and-play sparse attention for video diffusion models"
requires-python = ">=3.10"
license = "Apache-2.0"
dependencies = [
    "torch>=2.0.0",
    "diffusers>=0.36.0",
    "einops>=0.6.0",
]

[project.optional-dependencies]
spargeattn = ["spas-sage-attn"]
sta = ["triton"]
svg1 = []
svoo = ["flashinfer-python", "triton"]
svg2 = ["flashinfer-python", "triton"]
radial = ["flashinfer-python"]
draft = ["flashinfer-python", "triton"]
adacluster = ["flashinfer-python", "triton"]
flashomni = ["flashomni-python"]
all = ["flashinfer-python", "flashomni-python", "spas-sage-attn", "triton"]
dev = ["pytest", "ruff"]

[tool.hatch.build.targets.wheel]
packages = ["src/sparsevideo"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
